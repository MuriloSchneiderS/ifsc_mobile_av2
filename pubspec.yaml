name: ifsc_mobile_av2
description: "Plataforma online de publicação de arquivos de mídia (livros/imagens)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  firebase_database: ^11.3.5
  cloud_firestore: ^5.6.12
  geolocator: ^13.0.4             # Para obter a localização do dispositivo (remover caso não for utilizada)
  permission_handler: ^11.4.0     # Para gerenciar permissões
  shared_preferences: ^2.5.3      # Para armazenamento local
  cached_network_image: ^3.4.1    # Para cache de imagens
  flutter_spinkit: ^5.2.1         # Para animações de carregamento
  intl: ^0.20.2                   # Para formatação de datas e números
  sensors_plus: ^7.1.0            # Para acessar os sensores do dispositivo
  flutter_pdfview: ^1.1.6         # Para visualizar PDFs
  flutter_epub_viewer: ^1.2.8     # Para visualizar EPUBs
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
